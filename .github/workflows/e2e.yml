name: E2E Tests

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Start E2E backend stack
        run: docker compose -f docker-compose.e2e.yml up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/actuator/health; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose -f docker-compose.e2e.yml logs backend-e2e
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Vite dev server
        working-directory: frontend
        run: |
          npm run dev &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5173; then
              echo "Vite ready"
              exit 0
            fi
            sleep 1
          done
          echo "Vite did not start"
          exit 1

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: true
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

      - name: Backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
