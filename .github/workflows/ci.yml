name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves CI minutes, avoids stale deploys)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Backend: compile, test, coverage ───────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: agroconnect_test
          POSTGRES_USER: agroconnect
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agroconnect -d agroconnect_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit + integration tests with coverage
        working-directory: backend
        run: mvn verify -q
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: agroconnect_test
          DB_USER: agroconnect
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SPRING_PROFILES_ACTIVE: dev

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 14

      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          retention-days: 14

  # ─── Frontend: lint, build, test, coverage ──────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ─── SonarCloud: static analysis + coverage ─────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile backend (for Sonar Java analysis)
        working-directory: backend
        run: mvn compile -q -DskipTests

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── Docker: build images + security scan ───────────────────────
  docker:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t agroconnect-backend:ci -f docker/backend/Dockerfile ./backend

      - name: Build frontend image
        run: docker build -t agroconnect-frontend:ci -f docker/frontend/Dockerfile ./frontend

      - name: Run Trivy vulnerability scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'agroconnect-backend:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy vulnerability scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'agroconnect-frontend:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ─── Deploy: backup → build → restart → verify ─────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/agroconnect

            echo "══════════════════════════════════════"
            echo "  AgroConnect Deploy — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════"

            # ── 1. Database backup ──
            echo "▸ Creating database backup..."
            BACKUP_DIR="/opt/agroconnect/backups"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date '+%Y%m%d_%H%M%S').sql.gz"
            docker compose exec -T postgres pg_dump -U "${POSTGRES_USER:-agroconnect}" "${POSTGRES_DB:-agroconnect}" | gzip > "$BACKUP_FILE"
            echo "  ✓ Backup saved: $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"

            # Keep only last 10 backups
            ls -1t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm --
            echo "  ✓ Old backups cleaned (keeping last 10)"

            # ── 2. Pull latest code ──
            echo "▸ Pulling latest code..."
            git pull origin main --ff-only
            echo "  ✓ Code updated to $(git rev-parse --short HEAD)"

            # ── 3. Build and restart ──
            echo "▸ Building and restarting services..."
            docker compose up -d --build --remove-orphans 2>&1
            echo "  ✓ Containers restarted"

            # ── 4. Wait for backend health ──
            echo "▸ Waiting for backend to become healthy..."
            MAX_RETRIES=30
            RETRY_INTERVAL=5
            for i in $(seq 1 $MAX_RETRIES); do
              if curl -sf --max-time 5 https://agroconnect.pt/api/actuator/health > /dev/null 2>&1; then
                echo "  ✓ Backend healthy (attempt $i/$MAX_RETRIES)"
                break
              fi
              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "  ✗ Backend failed health check after $MAX_RETRIES attempts"
                echo "▸ Rolling back..."
                git checkout HEAD~1 -- .
                docker compose up -d --build 2>&1
                echo "  ⚠ Rolled back to previous version"
                exit 1
              fi
              echo "  … attempt $i/$MAX_RETRIES — retrying in ${RETRY_INTERVAL}s"
              sleep $RETRY_INTERVAL
            done

            # ── 5. Verify frontend ──
            echo "▸ Verifying frontend..."
            if curl -sf --max-time 5 https://agroconnect.pt/ > /dev/null 2>&1; then
              echo "  ✓ Frontend responding"
            else
              echo "  ⚠ Frontend may still be starting"
            fi

            # ── 6. Summary ──
            echo ""
            echo "══════════════════════════════════════"
            echo "  ✓ Deploy complete!"
            echo "  Commit: $(git rev-parse --short HEAD)"
            echo "  Time:   $(date '+%Y-%m-%d %H:%M:%S')"
            echo "══════════════════════════════════════"
