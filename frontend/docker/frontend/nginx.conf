server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: all routes → index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets with hashed filenames
    location ~* \.(js|css|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|svg|ico|webp|jpg|jpeg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # No cache for index.html and service worker
    location ~* (index\.html|sw\.js|workbox-.*)$ {
        add_header Cache-Control "no-cache";
    }
}
