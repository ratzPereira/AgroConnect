spring:
  # ── DataSource ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:agroconnect}
    username: ${DB_USER:agroconnect}
    password: ${DB_PASSWORD:dev_password_123}
    hikari:
      maximum-pool-size: 10

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

  # ── JPA (dev overrides) ──
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ── Logging ──
logging:
  level:
    com.agroconnect: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
