<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8" />
    <title>Disputa resolvida</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #f5f5f5;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr><td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"
               style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
            <tr><td>
                <div th:replace="~{email/fragments/header :: header}"></div>
            </td></tr>
            <tr><td style="padding: 32px 24px;">
                <p style="font-size: 16px; color: #333; margin: 0 0 16px;">
                    Ol&aacute; <span th:text="${recipientName}">Utilizador</span>,
                </p>
                <p style="font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 16px;">
                    A disputa relativa ao teu pedido foi resolvida.
                </p>
                <p style="font-size: 14px; color: #555; line-height: 1.6; margin: 0 0 16px;">
                    Resolu&ccedil;&atilde;o: <strong th:text="${resolution}">...</strong>
                </p>
                <div th:replace="~{email/fragments/cta-button :: cta(${baseUrl} + '/cliente/pedidos/' + ${requestId}, 'Ver Detalhes')}"></div>
            </td></tr>
            <tr><td>
                <div th:replace="~{email/fragments/footer :: footer}"></div>
            </td></tr>
        </table>
    </td></tr>
</table>
</body>
</html>
