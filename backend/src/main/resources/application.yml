spring:
  application:
    name: agroconnect
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── JPA ──
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: true

  # ── Mail ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:11025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

  # ── Jackson ──
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ── Server ──
server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    context-path: /api

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized

# ── Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ── App Config ──
agroconnect:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-at-least-256-bits-long-for-hs256-algorithm}
    access-token-expiration: 900000    # 15 minutes
    refresh-token-expiration: 604800000 # 7 days
  commission:
    rate: ${COMMISSION_RATE:0.12}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:19000}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_BUCKET:agroconnect}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  mail:
    from: ${MAIL_FROM:noreply@agroconnect.pt}
    base-url: ${APP_BASE_URL:http://localhost:8000}
  rate-limit:
    login-max: 5
    login-window-seconds: 60
    register-max: 3
    register-window-seconds: 60
    api-default-max: 60
    api-default-window-seconds: 60
  security:
    brute-force-max-attempts: 5
    brute-force-lockout-minutes: 15
    email-verification-expiry-hours: 24
    password-reset-expiry-minutes: 60

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{requestId:-}] %-5level %logger{36} - %msg%n"
